<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Task Manager</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- WebSocket Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
</head>
<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">Task Manager Dashboard</span>
            <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container">
        <!-- Analytics Section (Pandas/Numpy data aayega yahan) -->
        <div class="row mb-4 text-center">
            <div class="col-md-3">
                <div class="card shadow-sm bg-primary text-white">
                    <div class="card-body">
                        <h5 class="card-title">Total Tasks</h5>
                        <h2 id="totalTasks">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card shadow-sm bg-success text-white">
                    <div class="card-body">
                        <h5 class="card-title">Completed</h5>
                        <h2 id="completedTasks">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card shadow-sm bg-warning text-dark">
                    <div class="card-body">
                        <h5 class="card-title">Pending</h5>
                        <h2 id="pendingTasks">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card shadow-sm bg-info text-white">
                    <div class="card-body">
                        <h5 class="card-title">Completion %</h5>
                        <h2 id="completionPercentage">0%</h2>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <!-- Add Task Form -->
            <div class="col-md-4">
                <div class="card shadow-sm mb-4">
                    <div class="card-header bg-dark text-white">Add New Task</div>
                    <div class="card-body">
                        <form id="taskForm">
                            <div class="mb-3">
                                <label>Title</label>
                                <input type="text" id="taskTitle" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label>Description</label>
                                <textarea id="taskDesc" class="form-control"></textarea>
                            </div>
                            <div class="mb-3">
                                <label>Priority</label>
                                <select id="taskPriority" class="form-select">
                                    <option>High</option>
                                    <option>Medium</option>
                                    <option>Low</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Add Task</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Task List -->
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-dark text-white">Your Tasks <span class="badge bg-success float-end" id="liveStatus">Live Update: ON</span></div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead>
                                    <tr>
                                        <th>Title</th>
                                        <th>Priority</th>
                                        <th>Status</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>
                                <tbody id="taskList">
                                    <!-- Tasks Javascript se aayenge -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Javascript Magic -->
    <script>
        // WebSockets Connect karna
        const socket = io();

        // Jab bhi backend se 'task_updated' event aaye, data refresh karo bina reload kiye!
        socket.on('task_updated', function(data) {
            console.log("Real-time Update:", data.msg);
            loadTasks();
            loadAnalytics();
        });

        // 1. Tasks Load Karna
        async function loadTasks() {
            const res = await fetch('/api/tasks');
            const tasks = await res.json();
            let html = '';
            tasks.forEach(task => {
                let badgeColor = task.status === 'Completed' ? 'success' : 'warning';
                html += `
                    <tr>
                        <td><strong>${task.title}</strong><br><small class="text-muted">${task.description}</small></td>
                        <td>${task.priority}</td>
                        <td><span class="badge bg-${badgeColor}">${task.status}</span></td>
                        <td>
                            ${task.status === 'Pending' ? `<button class="btn btn-sm btn-success" onclick="updateStatus(${task.id})">✔ Done</button>` : ''}
                            <button class="btn btn-sm btn-danger" onclick="deleteTask(${task.id})">🗑</button>
                        </td>
                    </tr>
                `;
            });
            document.getElementById('taskList').innerHTML = html;
        }

        // 2. Analytics Load Karna
        async function loadAnalytics() {
            const res = await fetch('/api/analytics');
            const data = await res.json();
            document.getElementById('totalTasks').innerText = data.total_tasks;
            document.getElementById('completedTasks').innerText = data.completed_tasks;
            document.getElementById('pendingTasks').innerText = data.pending_tasks;
            document.getElementById('completionPercentage').innerText = data.completion_percentage + "%";
        }

        // 3. Naya Task Add Karna
        document.getElementById('taskForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = document.getElementById('taskTitle').value;
            const description = document.getElementById('taskDesc').value;
            const priority = document.getElementById('taskPriority').value;

            await fetch('/api/tasks', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ title, description, priority })
            });

            document.getElementById('taskForm').reset();
            // Data WebSocket se automatic refresh ho jayega!
        });

        // 4. Task ko Delete Karna
        async function deleteTask(id) {
            await fetch(`/api/tasks/${id}`, { method: 'DELETE' });
        }

        // 5. Task ko Completed mark karna
        async function updateStatus(id) {
            await fetch(`/api/tasks/${id}`, { 
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ status: 'Completed' })
            });
        }

        // Logout
        async function logout() {
            await fetch('/api/logout', { method: 'POST' });
            window.location.href = '/login';
        }

        // Page load hote hi data mangwao
        loadTasks();
        loadAnalytics();
    </script>
</body>
</html>
